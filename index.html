<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#ff6b6b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pomodoro" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Pomodoro 🍅</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      touch-action: manipulation; /* prevent double-tap zoom */
    }

    :root {
      --accent: #ff6b6b;
      --bg: #fff5f0;
      --text: #3d2020;
      --muted: #c0a090;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      transition: background 0.5s ease;
    }

    /* ═══════════════════════════════════════════
       PORTRAIT layout
    ═══════════════════════════════════════════ */
    .app {
      height: 100dvh;
      display: grid;
      grid-template-areas:
        "topbar"
        "ring"
        "controls"
        "forest";
      grid-template-rows: auto 1fr auto auto;
      padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 12px)
               env(safe-area-inset-bottom, 12px) env(safe-area-inset-left, 12px);
      padding-top:    max(env(safe-area-inset-top), 12px);
      padding-bottom: max(env(safe-area-inset-bottom), 8px);
      gap: clamp(8px, 1.5vh, 18px);
      align-items: center;
      justify-items: center;
    }

    /* ═══════════════════════════════════════════
       LANDSCAPE layout
    ═══════════════════════════════════════════ */
    @media (orientation: landscape) {
      .app {
        grid-template-areas:
          "topbar  forest"
          "ring    forest"
          "controls forest";
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr clamp(110px, 22vw, 200px);
        gap: clamp(4px, 1vh, 12px);
        padding: max(env(safe-area-inset-top), 8px)
                 max(env(safe-area-inset-right), 8px)
                 max(env(safe-area-inset-bottom), 8px)
                 max(env(safe-area-inset-left), 8px);
      }
      .ring-area { width: 100%; }
      .ring-wrap {
        width:  min(54vh, 54vw, 320px) !important;
        height: min(54vh, 54vw, 320px) !important;
      }
      .forest-panel {
        grid-area: forest;
        flex-direction: column !important;
        height: 100%;
        max-height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        align-items: center;
        padding: 8px 6px;
        gap: 6px !important;
        flex-wrap: nowrap !important;
        justify-content: flex-start !important;
        background: rgba(255,255,255,0.45);
        border-radius: 20px;
        border: 2px solid rgba(0,0,0,0.05);
      }
      .forest-title { writing-mode: horizontal-tb; font-size: 11px; }
    }

    /* ── TOP BAR ── */
    .topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 560px;
    }
    .tabs {
      flex: 1;
      display: flex;
      gap: 5px;
      background: rgba(0,0,0,0.06);
      padding: clamp(4px, 0.8vw, 7px);
      border-radius: 999px;
    }
    .tab {
      flex: 1; border: none; background: transparent;
      padding: clamp(8px, 1.4vw, 14px) 4px;
      border-radius: 999px;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(11px, 1.6vw, 17px);
      font-weight: 800; cursor: pointer; color: var(--muted);
      transition: all 0.22s ease; white-space: nowrap;
    }
    .tab.active { background: white; color: var(--accent); box-shadow: 0 3px 12px rgba(0,0,0,0.11); }

    .btn-gear {
      width:  clamp(42px, 6.5vw, 58px);
      height: clamp(42px, 6.5vw, 58px);
      border-radius: 50%; border: 3px solid rgba(0,0,0,0.08);
      background: white; color: var(--muted);
      font-size: clamp(16px, 2.8vw, 24px); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.07);
      transition: all 0.2s ease; flex-shrink: 0;
    }
    .btn-gear:hover { color: var(--text); transform: rotate(35deg); }
    .btn-gear:active { transform: scale(0.9) rotate(35deg); }

    /* ── RING ── */
    .ring-area {
      grid-area: ring;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(6px, 1.2vw, 14px); width: 100%;
    }
    .ring-wrap {
      position: relative;
      width:  min(62vw, 62vh, 380px);
      height: min(62vw, 62vh, 380px);
    }
    .ring-wrap svg { overflow: visible; }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(2px, 0.8vw, 8px);
    }
    .tomato-wrap {
      width:  clamp(44px, 10vw, 80px);
      height: clamp(44px, 10vw, 80px);
    }
    .tomato-wrap.bounce { animation: tbounce 0.5s cubic-bezier(.36,.07,.19,.97); }
    @keyframes tbounce {
      0%,100% { transform: scale(1); }
      30%  { transform: scale(1.35) rotate(-8deg); }
      60%  { transform: scale(1.2)  rotate(6deg); }
    }
    .ring-time {
      font-size: clamp(42px, 11vw, 88px);
      font-weight: 900; color: var(--text);
      letter-spacing: -2px; line-height: 1;
    }
    .ring-label {
      font-size: clamp(10px, 1.8vw, 16px); font-weight: 800;
      letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
    }
    .dots {
      display: flex; gap: clamp(8px, 1.8vw, 16px);
    }
    .dot {
      width:  clamp(10px, 2.2vw, 18px);
      height: clamp(10px, 2.2vw, 18px);
      border-radius: 50%; background: rgba(0,0,0,0.08);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.filled { background: var(--accent); transform: scale(1.2); }
    #arc-track { stroke: rgba(0,0,0,0.07); }
    #arc-fill  {
      stroke: var(--accent);
      transition: stroke-dashoffset 0.65s linear, stroke 0.4s ease;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 50%, transparent));
    }

    /* ── CONTROLS ── */
    .controls {
      grid-area: controls;
      display: flex; gap: clamp(10px, 2vw, 22px);
      align-items: center; width: 100%; max-width: 480px;
      justify-content: center;
    }
    .btn-main {
      flex: 1; max-width: 220px;
      height: clamp(58px, 8.5vw, 82px);
      border: none; border-radius: 999px;
      background: var(--accent); color: white;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(17px, 2.8vw, 26px);
      font-weight: 900; letter-spacing: 1.5px; cursor: pointer;
      box-shadow: 0 5px 20px color-mix(in srgb, var(--accent) 45%, transparent);
      transition: all 0.18s ease;
    }
    .btn-main:hover  { filter: brightness(1.07); transform: translateY(-2px); }
    .btn-main:active { transform: scale(0.94); box-shadow: none; }
    .btn-icon {
      width:  clamp(58px, 8.5vw, 82px);
      height: clamp(58px, 8.5vw, 82px);
      border-radius: 50%; border: 3px solid rgba(0,0,0,0.08);
      background: white; color: var(--muted);
      font-size: clamp(20px, 3.5vw, 32px); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.07);
      transition: all 0.18s ease; flex-shrink: 0;
    }
    .btn-icon:hover  { color: var(--text); transform: translateY(-2px); }
    .btn-icon:active { transform: scale(0.9); }

    /* ── FOREST PANEL (portrait) ── */
    .forest-panel {
      grid-area: forest;
      width: 100%;
      display: flex; flex-wrap: wrap;
      justify-content: center; align-items: flex-end;
      gap: 4px;
      padding: 4px 8px;
      min-height: clamp(48px, 8vh, 80px);
      max-height: clamp(80px, 16vh, 140px);
      overflow: hidden;
    }
    .forest-title {
      width: 100%; text-align: center;
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: 1px; margin-bottom: 2px;
    }
    .tree-svg {
      width:  clamp(28px, 4.5vw, 44px);
      height: clamp(34px, 5.5vw, 52px);
      flex-shrink: 0;
      animation: treePop 0.5s cubic-bezier(.34,1.56,.64,1);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12));
    }
    @keyframes treePop {
      0% { transform: scale(0) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ── VERSION ── */
    .version {
      position: fixed; bottom: max(env(safe-area-inset-bottom), 4px); right: 8px;
      font-size: 10px; color: rgba(0,0,0,0.15); font-family: monospace;
      pointer-events: none;
    }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed; pointer-events: none; border-radius: 3px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── SETTINGS MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: 28px;
      padding: clamp(20px, 3.5vw, 36px);
      width: min(400px, 88vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: translateY(24px) scale(0.97);
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal h2 {
      font-size: clamp(17px, 2.8vw, 22px); font-weight: 900;
      margin-bottom: clamp(16px, 2.5vw, 28px);
    }
    .setting-row { margin-bottom: clamp(14px, 2.2vw, 22px); }
    .setting-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: clamp(13px, 2vw, 17px); font-weight: 800; margin-bottom: 9px;
    }
    .setting-label span { color: var(--accent); font-size: clamp(16px, 2.5vw, 20px); font-weight: 900; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 10px; border-radius: 999px;
      background: rgba(0,0,0,0.08); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width:  clamp(28px, 4.5vw, 38px);
      height: clamp(28px, 4.5vw, 38px);
      border-radius: 50%; background: var(--accent); cursor: pointer;
      box-shadow: 0 3px 8px color-mix(in srgb, var(--accent) 45%, transparent);
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }
    .modal-actions { display: flex; gap: 10px; margin-top: clamp(18px, 2.5vw, 28px); }
    .btn-save {
      flex: 1; height: clamp(50px, 7vw, 62px);
      border: none; border-radius: 999px; background: var(--accent); color: white;
      font-family: 'Nunito', sans-serif; font-size: clamp(14px, 2.2vw, 19px);
      font-weight: 900; cursor: pointer;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 40%, transparent);
      transition: all 0.18s;
    }
    .btn-save:active { transform: scale(0.95); }
    .btn-cancel {
      height: clamp(50px, 7vw, 62px); padding: 0 clamp(18px, 2.5vw, 28px);
      border: 3px solid rgba(0,0,0,0.08); border-radius: 999px;
      background: white; color: var(--muted);
      font-family: 'Nunito', sans-serif; font-size: clamp(14px, 2.2vw, 19px);
      font-weight: 800; cursor: pointer; transition: all 0.18s;
    }
    .btn-cancel:active { transform: scale(0.95); }
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar: tabs + gear -->
  <div class="topbar">
    <div class="tabs">
      <button class="tab active" data-mode="work">🍅 Munka</button>
      <button class="tab" data-mode="short">☕ Kis szünet</button>
      <button class="tab" data-mode="long">🌙 Nagy szünet</button>
    </div>
    <button class="btn-gear" id="btn-gear">⚙️</button>
  </div>

  <!-- Timer ring -->
  <div class="ring-area">
    <div class="ring-wrap" id="ring-wrap">
      <svg id="ring-svg" viewBox="0 0 420 420" width="100%" height="100%">
        <circle id="arc-track" cx="210" cy="210" r="185" fill="none" stroke-width="22"/>
        <circle id="arc-fill"  cx="210" cy="210" r="185" fill="none" stroke-width="22"
                stroke-linecap="round" stroke-dasharray="1162.83" stroke-dashoffset="0"/>
        <circle cx="210" cy="210" r="155" fill="white" opacity="0.65"/>
        <g id="ticks" opacity="0.12"></g>
      </svg>
      <div class="ring-center">
        <div class="tomato-wrap" id="tomato-wrap">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="30" cy="22" rx="13" ry="7" fill="#5cb85c" transform="rotate(-25 30 22)"/>
            <ellipse cx="50" cy="22" rx="13" ry="7" fill="#4cae4c" transform="rotate(25 50 22)"/>
            <rect x="37" y="10" width="6" height="16" rx="3" fill="#5cb85c"/>
            <ellipse cx="41" cy="53" rx="27" ry="25" fill="#e05050" opacity="0.22"/>
            <ellipse id="tomato-body" cx="40" cy="50" rx="27" ry="25" fill="#ff6b6b"/>
            <ellipse cx="31" cy="38" rx="7" ry="5" fill="white" opacity="0.32" transform="rotate(-20 31 38)"/>
            <path d="M 20 62 Q 40 72 60 62" stroke="#e05050" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.45"/>
          </svg>
        </div>
        <div class="ring-time" id="display">25:00</div>
        <div class="ring-label" id="mode-label">FÓKUSZ</div>
      </div>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-icon" id="btn-reset">↺</button>
    <button class="btn-main" id="btn-start">START</button>
    <button class="btn-icon" id="btn-skip">⏭</button>
  </div>

  <!-- Forest -->
  <div class="forest-panel" id="forest-panel">
    <div class="forest-title" id="forest-title"></div>
  </div>

</div>

<!-- Version -->
<div class="version">v1.0.5</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>⚙️ Beállítások</h2>
    <div class="setting-row">
      <div class="setting-label">🍅 Fókusz ideje <span id="lbl-work">25 perc</span></div>
      <input type="range" id="sl-work" min="5" max="60" step="5" value="25"/>
    </div>
    <div class="setting-row">
      <div class="setting-label">☕ Kis szünet <span id="lbl-short">5 perc</span></div>
      <input type="range" id="sl-short" min="1" max="15" step="1" value="5"/>
    </div>
    <div class="setting-row">
      <div class="setting-label">🌙 Nagy szünet <span id="lbl-long">15 perc</span></div>
      <input type="range" id="sl-long" min="5" max="30" step="5" value="15"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Mégse</button>
      <button class="btn-save" id="btn-save">Mentés ✓</button>
    </div>
  </div>
</div>

<script>
// ── SETTINGS ────────────────────────────────────────
const DEFAULTS = { work: 25, short: 5, long: 15 };
function loadSettings() {
  try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem("pomo-settings")) }; }
  catch { return { ...DEFAULTS }; }
}
function saveSettings(s) { localStorage.setItem("pomo-settings", JSON.stringify(s)); }
let settings = loadSettings();

// ── FOREST ──────────────────────────────────────────
function loadForest() {
  try { return JSON.parse(localStorage.getItem("pomo-forest")) || []; }
  catch { return []; }
}
function saveForest(f) { localStorage.setItem("pomo-forest", JSON.stringify(f)); }
let forest = loadForest();

// 12 different tree SVGs (viewBox 0 0 40 52)

  // 6: Bamboo
  `<svg viewBox="0 0 40 52" xmlns="http://www.w3.org/2000/svg">

const TREE_NAMES = [
  "Fenyő","Tölgy","Cseresznyefa","Kaktusz","Pálma",
  "Juharfa","Bambusz","Fűzfa","Varázsgomba","Havas fenyő","Almafa","Bonsai"
];

// ── MODES ────────────────────────────────────────────
const MODES = {
  work:  { label:"FÓKUSZ",      get duration(){ return settings.work  * 60; }, color:"#ff6b6b", bg:"#fff5f0" },
  short: { label:"KIS SZÜNET",  get duration(){ return settings.short * 60; }, color:"#26c485", bg:"#f0fdf7" },
  long:  { label:"NAGY SZÜNET", get duration(){ return settings.long  * 60; }, color:"#7b8cde", bg:"#f4f3ff" },
};
const CIRC = 2 * Math.PI * 185;

let mode = "work", timeLeft = MODES.work.duration;
let running = false, workCount = 0, sessionsToday = 0, interval = null;

// DOM refs
const display    = document.getElementById("display");
const modeLabel  = document.getElementById("mode-label");
const arcFill    = document.getElementById("arc-fill");
const dotsEl     = document.getElementById("dots");
const countTitle = document.getElementById("forest-title");
const btnStart   = document.getElementById("btn-start");
const tomatoBody = document.getElementById("tomato-body");
const tomatoWrap = document.getElementById("tomato-wrap");
const tabs       = document.querySelectorAll(".tab");
const forestPanel= document.getElementById("forest-panel");

// ── TICK MARKS ───────────────────────────────────────
(function() {
  const g = document.getElementById("ticks");
  for (let i = 0; i < 60; i++) {
    const a = (i/60)*2*Math.PI - Math.PI/2;
    const major = i % 5 === 0;
    const r1 = 185-(major?16:9), r2 = 185+(major?16:9);
    const ln = document.createElementNS("http://www.w3.org/2000/svg","line");
    ln.setAttribute("x1", 210+r1*Math.cos(a)); ln.setAttribute("y1", 210+r1*Math.sin(a));
    ln.setAttribute("x2", 210+r2*Math.cos(a)); ln.setAttribute("y2", 210+r2*Math.sin(a));
    ln.setAttribute("stroke","#000");
    ln.setAttribute("stroke-width", major ? 3 : 1.5);
    ln.setAttribute("stroke-linecap","round");
    g.appendChild(ln);
  }
})();

// ── AUDIO ────────────────────────────────────────────
const actx = new (window.AudioContext || window.webkitAudioContext)();
function playChime(type) {
  actx.resume();
  const seqs = {
    start:    [[523.25,0],[659.25,.15],[783.99,.30]],
    break:    [[783.99,0],[659.25,.15],[523.25,.30]],
    complete: [[523.25,0],[659.25,.15],[783.99,.30],[1046.5,.50]],
  };
  (seqs[type]||[]).forEach(([freq, dt]) => {
    const osc = actx.createOscillator(), g = actx.createGain();
    osc.connect(g); g.connect(actx.destination);
    osc.type = "sine"; osc.frequency.value = freq;
    const t = actx.currentTime + dt;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
    osc.start(t); osc.stop(t+0.55);
  });
}

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

// ── THEME ────────────────────────────────────────────
function applyTheme(m) {
  const { color, bg } = MODES[m];
  document.documentElement.style.setProperty("--accent", color);
  document.body.style.background = bg;
  if (tomatoBody) tomatoBody.setAttribute("fill", color);
}

// ── FOREST ───────────────────────────────────────────
function renderForest() {
  // Remove old trees (keep title div)
  const title = document.getElementById("forest-title");
  forestPanel.innerHTML = "";
  forestPanel.appendChild(title);

  if (forest.length === 0) {
    title.textContent = "Teljesíts egy fókuszt, és fát kapsz! 🌱";
    return;
  }
  title.textContent = `Az erdőd: ${forest.length} fa 🌳`;

  forest.forEach((treeIdx, i) => {
    const wrap = document.createElement("div");
    wrap.title = TREE_NAMES[treeIdx];
    wrap.className = "tree-svg";
    wrap.innerHTML = TREE_DEFS[treeIdx];
    wrap.querySelector("svg").setAttribute("width", "100%");
    wrap.querySelector("svg").setAttribute("height", "100%");
    forestPanel.appendChild(wrap);
  });
}

function giveTree() {
  const idx = Math.floor(Math.random() * TREE_DEFS.length);
  forest.push(idx);
  saveForest(forest);

  // Animate new tree with a delay
  setTimeout(() => {
    renderForest();
    // Briefly highlight the last tree
    const trees = forestPanel.querySelectorAll(".tree-svg");
    if (trees.length) {
      const last = trees[trees.length - 1];
      last.style.animation = "treePop 0.6s cubic-bezier(.34,1.56,.64,1)";
    }
  }, 700);
}

// ── RENDER ───────────────────────────────────────────
function renderDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i < workCount % 4 ? " filled" : "");
    dotsEl.appendChild(d);
  }
}
function renderArc() {
  arcFill.style.strokeDashoffset = CIRC * (1 - timeLeft / MODES[mode].duration);
}
function render() {
  display.textContent = fmt(timeLeft);
  modeLabel.textContent = MODES[mode].label;
  btnStart.textContent = running ? "PAUSE" : "START";
  renderArc(); renderDots();
  tabs.forEach(t => t.classList.toggle("active", t.dataset.mode === mode));
}

// ── BOUNCE ───────────────────────────────────────────
function bounce() {
  tomatoWrap.classList.remove("bounce");
  void tomatoWrap.offsetWidth;
  tomatoWrap.classList.add("bounce");
  setTimeout(() => tomatoWrap.classList.remove("bounce"), 500);
}

// ── CONFETTI ─────────────────────────────────────────
function confetti() {
  const colors = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff922b","#cc5de8"];
  for (let i = 0; i < 52; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.cssText = `left:${Math.random()*100}vw;top:-16px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?"50%":"3px"};
      width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;
      animation-duration:${1.8+Math.random()*1.4}s;
      animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

// ── MODE SWITCH ──────────────────────────────────────
function switchMode(m, sound) {
  mode = m; timeLeft = MODES[m].duration;
  running = false; clearInterval(interval);
  applyTheme(m); bounce();
  if (sound) playChime(sound);
  render();
}

function advance() {
  if (mode === "work") {
    workCount++; sessionsToday++;
    confetti();
    playChime("complete");
    giveTree();
    const next = workCount % 4 === 0 ? "long" : "short";
    setTimeout(() => switchMode(next, "break"), 700);
  } else {
    switchMode("work", "start");
  }
}

function tick() {
  if (timeLeft <= 1) {
    clearInterval(interval); running = false; timeLeft = 0; render(); advance(); return;
  }
  timeLeft--; render();
}

// ── BUTTON LISTENERS ─────────────────────────────────
btnStart.addEventListener("click", () => {
  actx.resume(); running = !running;
  if (running) { playChime("start"); interval = setInterval(tick, 1000); }
  else clearInterval(interval);
  render();
});
document.getElementById("btn-reset").addEventListener("click", () => {
  running = false; clearInterval(interval); timeLeft = MODES[mode].duration; render();
});
document.getElementById("btn-skip").addEventListener("click", () => {
  running = false; clearInterval(interval); advance();
});
tabs.forEach(t => t.addEventListener("click", () => {
  if (t.dataset.mode !== mode) switchMode(t.dataset.mode, null);
}));

// ── SETTINGS MODAL ───────────────────────────────────
const overlay  = document.getElementById("modal-overlay");
const slWork   = document.getElementById("sl-work");
const slShort  = document.getElementById("sl-short");
const slLong   = document.getElementById("sl-long");
const lblWork  = document.getElementById("lbl-work");
const lblShort = document.getElementById("lbl-short");
const lblLong  = document.getElementById("lbl-long");

function openSettings() {
  slWork.value = settings.work; slShort.value = settings.short; slLong.value = settings.long;
  lblWork.textContent  = settings.work  + " perc";
  lblShort.textContent = settings.short + " perc";
  lblLong.textContent  = settings.long  + " perc";
  overlay.classList.add("open");
}
function closeSettings() { overlay.classList.remove("open"); }
slWork.addEventListener("input",  () => lblWork.textContent  = slWork.value  + " perc");
slShort.addEventListener("input", () => lblShort.textContent = slShort.value + " perc");
slLong.addEventListener("input",  () => lblLong.textContent  = slLong.value  + " perc");
document.getElementById("btn-gear").addEventListener("click", openSettings);
document.getElementById("btn-cancel").addEventListener("click", closeSettings);
overlay.addEventListener("click", e => { if (e.target === overlay) closeSettings(); });
document.getElementById("btn-save").addEventListener("click", () => {
  settings = { work: +slWork.value, short: +slShort.value, long: +slLong.value };
  saveSettings(settings);
  running = false; clearInterval(interval);
  timeLeft = MODES[mode].duration;
  closeSettings(); render();
});

// ── SERVICE WORKER ───────────────────────────────────
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(console.error);

// ── INIT ─────────────────────────────────────────────
applyTheme("work");
renderForest();
render();
</script>
