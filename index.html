<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff6b6b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pomodoro" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Pomodoro 🍅</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --work:  #ff6b6b;
      --short: #26c485;
      --long:  #7b8cde;
      --accent: var(--work);
      --bg: #fff5f0;
      --card: #ffffff;
      --text: #3d2020;
      --muted: #c0a090;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.6s ease;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      align-items: center;
      justify-items: center;
      padding: clamp(16px, 4vw, 48px) clamp(12px, 3vw, 40px);
      gap: clamp(12px, 2.5vw, 28px);
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: clamp(8px, 1.5vw, 14px);
      background: rgba(0,0,0,0.06);
      padding: clamp(5px, 1vw, 8px);
      border-radius: 999px;
      width: 100%;
      max-width: 520px;
    }
    .tab {
      flex: 1;
      border: none;
      background: transparent;
      padding: clamp(10px, 1.8vw, 16px) clamp(8px, 1.5vw, 20px);
      border-radius: 999px;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(13px, 2vw, 20px);
      font-weight: 800;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.25s ease;
      white-space: nowrap;
    }
    .tab.active {
      background: white;
      color: var(--accent);
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    /* ── RING AREA ── */
    .ring-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 1.5vw, 16px);
      width: 100%;
    }

    .ring-wrap {
      position: relative;
      width: min(72vw, 72vh, 420px);
      height: min(72vw, 72vh, 420px);
    }
    .ring-wrap svg { overflow: visible; }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1vw, 10px);
    }

    /* Tomato SVG character */
    .tomato-wrap {
      width: clamp(52px, 11vw, 90px);
      height: clamp(52px, 11vw, 90px);
      transition: transform 0.3s ease;
    }
    .tomato-wrap.bounce {
      animation: bounce 0.5s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes bounce {
      0%,100% { transform: scale(1); }
      30%      { transform: scale(1.35) rotate(-8deg); }
      60%      { transform: scale(1.2)  rotate(6deg); }
    }

    .ring-time {
      font-size: clamp(48px, 12vw, 96px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1;
    }
    .ring-label {
      font-size: clamp(11px, 2vw, 18px);
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── DOTS ── */
    .dots {
      display: flex;
      gap: clamp(10px, 2vw, 18px);
    }
    .dot {
      width: clamp(12px, 2.5vw, 20px);
      height: clamp(12px, 2.5vw, 20px);
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transition: background 0.35s ease, transform 0.35s ease;
    }
    .dot.filled { background: var(--accent); transform: scale(1.2); }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: clamp(12px, 2.5vw, 24px);
      align-items: center;
      width: 100%;
      max-width: 520px;
      justify-content: center;
    }

    .btn-main {
      flex: 1;
      max-width: 240px;
      height: clamp(64px, 9vw, 88px);
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 900;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 45%, transparent),
                  0 2px 6px rgba(0,0,0,0.1);
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-main:hover  { filter: brightness(1.06); transform: translateY(-3px); }
    .btn-main:active { transform: scale(0.94); box-shadow: none; }

    .btn-icon {
      width:  clamp(64px, 9vw, 88px);
      height: clamp(64px, 9vw, 88px);
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,0.08);
      background: white;
      color: var(--muted);
      font-size: clamp(22px, 4vw, 34px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.07);
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .btn-icon:hover  { color: var(--text); transform: translateY(-2px); }
    .btn-icon:active { transform: scale(0.9); }

    /* ── STATS ── */
    .stats {
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 700;
      color: var(--muted);
    }
    .stats b { color: var(--accent); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 3px;
      pointer-events: none;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
    }

    /* ── SVG ARC ── */
    #arc-track { stroke: rgba(0,0,0,0.07); }
    #arc-fill  {
      stroke: var(--accent);
      transition: stroke-dashoffset 0.65s linear, stroke 0.4s ease;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 50%, transparent));
    }

    /* ── TABS ROW ── */
    .tabs-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 580px;
    }

    /* ── GEAR BUTTON ── */
    .btn-gear {
      width:  clamp(44px, 7vw, 60px);
      height: clamp(44px, 7vw, 60px);
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,0.08);
      background: white;
      color: var(--muted);
      font-size: clamp(18px, 3vw, 26px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.07);
      transition: all 0.2s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-gear:hover  { color: var(--text); transform: rotate(30deg); }
    .btn-gear:active { transform: scale(0.9) rotate(30deg); }

    /* ── SETTINGS MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: white;
      border-radius: 28px;
      padding: clamp(24px, 4vw, 40px);
      width: min(420px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: translateY(24px) scale(0.97);
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal h2 {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 900;
      color: var(--text);
      margin-bottom: clamp(20px, 3vw, 32px);
      display: flex; align-items: center; gap: 10px;
    }

    .setting-row {
      margin-bottom: clamp(16px, 2.5vw, 24px);
    }
    .setting-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: clamp(14px, 2.2vw, 18px);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }
    .setting-label span {
      font-size: clamp(18px, 2.8vw, 22px);
      font-weight: 900;
      color: var(--accent);
      min-width: 52px;
      text-align: right;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.08);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: clamp(30px, 5vw, 40px);
      height: clamp(30px, 5vw, 40px);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 3px 10px color-mix(in srgb, var(--accent) 45%, transparent);
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }

    .modal-actions {
      display: flex; gap: 12px; margin-top: clamp(20px, 3vw, 32px);
    }
    .btn-save {
      flex: 1;
      height: clamp(52px, 7vw, 64px);
      border: none; border-radius: 999px;
      background: var(--accent); color: white;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(15px, 2.2vw, 20px);
      font-weight: 900; letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent);
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active { transform: scale(0.95); }
    .btn-cancel {
      height: clamp(52px, 7vw, 64px);
      padding: 0 clamp(20px, 3vw, 32px);
      border: 3px solid rgba(0,0,0,0.08); border-radius: 999px;
      background: white; color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: clamp(15px, 2.2vw, 20px);
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cancel:active { transform: scale(0.95); }
  </style>
</head>
<body>
<div class="app">

  <!-- Tabs + Gear -->
  <div class="tabs-row">
    <div class="tabs" style="flex:1">
      <button class="tab active" data-mode="work">🍅 Munka</button>
      <button class="tab" data-mode="short">☕ Kis szünet</button>
      <button class="tab" data-mode="long">🌙 Nagy szünet</button>
    </div>
    <button class="btn-gear" id="btn-gear" title="Beállítások">⚙️</button>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>⚙️ Beállítások</h2>
      <div class="setting-row">
        <div class="setting-label">🍅 Fókusz ideje <span id="lbl-work">25 perc</span></div>
        <input type="range" id="sl-work" min="5" max="60" step="5" value="25" />
      </div>
      <div class="setting-row">
        <div class="setting-label">☕ Kis szünet <span id="lbl-short">5 perc</span></div>
        <input type="range" id="sl-short" min="1" max="15" step="1" value="5" />
      </div>
      <div class="setting-row">
        <div class="setting-label">🌙 Nagy szünet <span id="lbl-long">15 perc</span></div>
        <input type="range" id="sl-long" min="5" max="30" step="5" value="15" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Mégse</button>
        <button class="btn-save" id="btn-save">Mentés ✓</button>
      </div>
    </div>
  </div>

  <!-- Ring -->
  <div class="ring-area">
    <div class="ring-wrap" id="ring-wrap">
      <svg id="ring-svg" viewBox="0 0 420 420" width="100%" height="100%">
        <!-- Decorative dashes outer ring -->
        <circle id="arc-track" cx="210" cy="210" r="185" fill="none" stroke-width="22"/>
        <!-- Progress arc -->
        <circle id="arc-fill"  cx="210" cy="210" r="185" fill="none" stroke-width="22"
                stroke-linecap="round"
                stroke-dasharray="1162.83"
                stroke-dashoffset="0"/>
        <!-- Inner soft circle -->
        <circle cx="210" cy="210" r="155" fill="white" opacity="0.7"/>
        <!-- Tick marks -->
        <g id="ticks" opacity="0.13"></g>
      </svg>
      <div class="ring-center">
        <div class="tomato-wrap" id="tomato-wrap">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <!-- Leaf left -->
            <ellipse cx="30" cy="22" rx="13" ry="7" fill="#5cb85c" transform="rotate(-25 30 22)"/>
            <!-- Leaf right -->
            <ellipse cx="50" cy="22" rx="13" ry="7" fill="#4cae4c" transform="rotate(25 50 22)"/>
            <!-- Stem -->
            <rect x="37" y="10" width="6" height="16" rx="3" fill="#5cb85c"/>
            <!-- Body shadow -->
            <ellipse cx="41" cy="53" rx="27" ry="25" fill="#e05050" opacity="0.25"/>
            <!-- Body -->
            <ellipse cx="40" cy="50" rx="27" ry="25" fill="#ff6b6b"/>
            <!-- Shine -->
            <ellipse cx="31" cy="38" rx="7" ry="5" fill="white" opacity="0.35" transform="rotate(-20 31 38)"/>
            <!-- Bottom crease -->
            <path d="M 20 62 Q 40 72 60 62" stroke="#e05050" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </div>
        <div class="ring-time" id="display">25:00</div>
        <div class="ring-label" id="mode-label">FÓKUSZ</div>
      </div>
    </div>

    <!-- Session dots -->
    <div class="dots" id="dots"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-icon" id="btn-reset" title="Újraindítás">↺</button>
    <button class="btn-main" id="btn-start">START</button>
    <button class="btn-icon" id="btn-skip" title="Kihagyás">⏭</button>
  </div>

  <!-- Stats -->
  <div class="stats">Ma: <b id="count">0</b> pomodoro 🎉</div>
  <div style="font-size:11px;color:#ddd;margin-top:4px;font-family:monospace;">v1.0.4</div>

</div>

<script>
// ── SETTINGS ──────────────────────────────────────────
const DEFAULTS = { work: 25, short: 5, long: 15 };
function loadSettings() {
  try { return JSON.parse(localStorage.getItem("pomo-settings")) || DEFAULTS; }
  catch { return DEFAULTS; }
}
function saveSettings(s) { localStorage.setItem("pomo-settings", JSON.stringify(s)); }

let settings = loadSettings();

const MODES = {
  work:  { label:"FÓKUSZ",      emoji:"🍅", get duration(){ return settings.work  * 60; }, color:"#ff6b6b", bg:"#fff5f0" },
  short: { label:"KIS SZÜNET",  emoji:"☕", get duration(){ return settings.short * 60; }, color:"#26c485", bg:"#f0fdf7" },
  long:  { label:"NAGY SZÜNET", emoji:"🌙", get duration(){ return settings.long  * 60; }, color:"#7b8cde", bg:"#f4f3ff" },
};
const CIRC = 2 * Math.PI * 185;

let mode = "work", timeLeft = MODES.work.duration;
let running = false, workCount = 0, sessionsToday = 0;
let interval = null;

const display   = document.getElementById("display");
const modeLabel = document.getElementById("mode-label");
const arcFill   = document.getElementById("arc-fill");
const dotsEl    = document.getElementById("dots");
const countEl   = document.getElementById("count");
const btnStart  = document.getElementById("btn-start");
const tomatoSvg = document.querySelector("#tomato-wrap svg ellipse[fill='#ff6b6b']");
const tomatoWrap= document.getElementById("tomato-wrap");
const tabs      = document.querySelectorAll(".tab");

// Draw tick marks
(function drawTicks() {
  const g = document.getElementById("ticks");
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isMajor = i % 5 === 0;
    const r1 = 185 - (isMajor ? 18 : 10);
    const r2 = 185 + (isMajor ? 18 : 10);
    const x1 = 210 + r1 * Math.cos(angle);
    const y1 = 210 + r1 * Math.sin(angle);
    const x2 = 210 + r2 * Math.cos(angle);
    const y2 = 210 + r2 * Math.sin(angle);
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("stroke", "#000");
    line.setAttribute("stroke-width", isMajor ? 3 : 1.5);
    line.setAttribute("stroke-linecap", "round");
    g.appendChild(line);
  }
})();

// Audio
const actx = new (window.AudioContext || window.webkitAudioContext)();
function playChime(type) {
  actx.resume();
  const seqs = {
    start:    [[523.25,0],[659.25,.15],[783.99,.30]],
    break:    [[783.99,0],[659.25,.15],[523.25,.30]],
    complete: [[523.25,0],[659.25,.15],[783.99,.30],[1046.5,.50]],
  };
  (seqs[type]||[]).forEach(([freq, dt]) => {
    const osc = actx.createOscillator(), g = actx.createGain();
    osc.connect(g); g.connect(actx.destination);
    osc.type = "sine"; osc.frequency.value = freq;
    const t = actx.currentTime + dt;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t); osc.stop(t + 0.55);
  });
}

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

function applyTheme(m) {
  const { color, bg } = MODES[m];
  document.documentElement.style.setProperty("--accent", color);
  document.documentElement.style.setProperty("--bg", bg);
  document.body.style.background = bg;
  // Recolor tomato body to match mode
  const bodies = tomatoWrap.querySelectorAll("ellipse[fill='#ff6b6b'],ellipse[fill='#26c485'],ellipse[fill='#7b8cde']");
  tomatoWrap.querySelectorAll("ellipse").forEach(el => {
    if (el.getAttribute("fill") === "#ff6b6b" || el.getAttribute("fill") === "#26c485" || el.getAttribute("fill") === "#7b8cde")
      el.setAttribute("fill", color);
    if (el.getAttribute("fill") === "#e05050")
      el.setAttribute("fill", color);
  });
}

function renderDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i < workCount % 4 ? " filled" : "");
    dotsEl.appendChild(d);
  }
}

function renderArc() {
  const p = timeLeft / MODES[mode].duration;
  arcFill.style.strokeDashoffset = CIRC * (1 - p);
}

function render() {
  display.textContent = fmt(timeLeft);
  modeLabel.textContent = MODES[mode].label;
  btnStart.textContent = running ? "PAUSE" : "START";
  countEl.textContent = sessionsToday;
  renderArc();
  renderDots();
  tabs.forEach(t => t.classList.toggle("active", t.dataset.mode === mode));
}

function bounce() {
  tomatoWrap.classList.remove("bounce");
  void tomatoWrap.offsetWidth;
  tomatoWrap.classList.add("bounce");
  setTimeout(() => tomatoWrap.classList.remove("bounce"), 500);
}

function confetti() {
  const colors = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff922b","#cc5de8"];
  for (let i = 0; i < 48; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -16px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: ${Math.random()>0.5?"50%":"3px"};
      width: ${8+Math.random()*10}px;
      height: ${8+Math.random()*10}px;
      animation-duration: ${1.8+Math.random()*1.4}s;
      animation-delay: ${Math.random()*0.5}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

function switchMode(m, sound) {
  mode = m; timeLeft = MODES[m].duration;
  running = false; clearInterval(interval);
  applyTheme(m); bounce();
  if (sound) playChime(sound);
  render();
}

function advance() {
  if (mode === "work") {
    workCount++; sessionsToday++;
    confetti();
    playChime("complete");
    const next = workCount % 4 === 0 ? "long" : "short";
    setTimeout(() => switchMode(next, "break"), 600);
  } else {
    switchMode("work", "start");
  }
}

btnStart.addEventListener("click", () => {
  actx.resume();
  running = !running;
  if (running) { playChime("start"); interval = setInterval(tick, 1000); }
  else clearInterval(interval);
  render();
});

document.getElementById("btn-reset").addEventListener("click", () => {
  running = false; clearInterval(interval);
  timeLeft = MODES[mode].duration; render();
});

document.getElementById("btn-skip").addEventListener("click", () => {
  running = false; clearInterval(interval); advance();
});

tabs.forEach(t => t.addEventListener("click", () => {
  if (t.dataset.mode !== mode) switchMode(t.dataset.mode, null);
}));

function tick() {
  if (timeLeft <= 1) {
    clearInterval(interval); running = false; timeLeft = 0; render(); advance(); return;
  }
  timeLeft--; render();
}

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(console.error);

// ── SETTINGS MODAL ────────────────────────────────────
const overlay  = document.getElementById("modal-overlay");
const slWork   = document.getElementById("sl-work");
const slShort  = document.getElementById("sl-short");
const slLong   = document.getElementById("sl-long");
const lblWork  = document.getElementById("lbl-work");
const lblShort = document.getElementById("lbl-short");
const lblLong  = document.getElementById("lbl-long");

function openSettings() {
  slWork.value  = settings.work;
  slShort.value = settings.short;
  slLong.value  = settings.long;
  lblWork.textContent  = settings.work  + " perc";
  lblShort.textContent = settings.short + " perc";
  lblLong.textContent  = settings.long  + " perc";
  overlay.classList.add("open");
}
function closeSettings() { overlay.classList.remove("open"); }

slWork.addEventListener("input",  () => lblWork.textContent  = slWork.value  + " perc");
slShort.addEventListener("input", () => lblShort.textContent = slShort.value + " perc");
slLong.addEventListener("input",  () => lblLong.textContent  = slLong.value  + " perc");

document.getElementById("btn-gear").addEventListener("click", openSettings);
document.getElementById("btn-cancel").addEventListener("click", closeSettings);
overlay.addEventListener("click", e => { if (e.target === overlay) closeSettings(); });

document.getElementById("btn-save").addEventListener("click", () => {
  settings = { work: +slWork.value, short: +slShort.value, long: +slLong.value };
  saveSettings(settings);
  running = false; clearInterval(interval);
  timeLeft = MODES[mode].duration;
  closeSettings();
  render();
});

applyTheme("work");
render();
</script>
</body>
</html>
