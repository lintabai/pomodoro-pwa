<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff6b6b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pomodoro" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Pomodoro 🍅</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --work:   #ff6b6b;
      --short:  #63cdda;
      --long:   #a29bfe;
      --bg-work:  #fff5f5;
      --bg-short: #f0fbfc;
      --bg-long:  #f5f3ff;
      --card: #ffffffcc;
      --text: #3d2c2c;
      --muted: #b8a8a8;
      --accent: var(--work);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-work);
      transition: background 0.6s ease;
      overflow: hidden;
    }

    /* Blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      transition: background 0.6s ease, transform 0.6s ease;
    }
    .blob1 { width: 340px; height: 340px; top: -80px; left: -80px; background: var(--accent); }
    .blob2 { width: 260px; height: 260px; bottom: -60px; right: -60px; background: var(--accent); }

    .card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 36px 32px 28px;
      width: min(360px, 92vw);
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Mode tabs */
    .tabs {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.05);
      padding: 4px;
      border-radius: 16px;
      margin-bottom: 28px;
      width: 100%;
    }
    .tab {
      flex: 1;
      border: none;
      background: transparent;
      padding: 7px 6px;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.25s ease;
    }
    .tab.active {
      background: white;
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Timer ring */
    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 8px;
    }
    .ring-wrap svg {
      transform: rotate(-90deg);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
    }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .ring-emoji {
      font-size: 30px;
      line-height: 1;
      animation: none;
    }
    .ring-emoji.pulse {
      animation: wiggle 0.5s ease;
    }
    @keyframes wiggle {
      0%   { transform: scale(1) rotate(0deg); }
      25%  { transform: scale(1.3) rotate(-8deg); }
      50%  { transform: scale(1.2) rotate(8deg); }
      75%  { transform: scale(1.1) rotate(-4deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .ring-time {
      font-size: 44px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }
    .ring-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Session dots */
    .dots {
      display: flex;
      gap: 8px;
      margin: 18px 0 24px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .dot.filled {
      background: var(--accent);
      transform: scale(1.15);
    }

    /* Buttons */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn-main {
      width: 110px;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent);
      transition: all 0.2s ease;
      active: none;
    }
    .btn-main:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .btn-main:active { transform: scale(0.95) translateY(0); }

    .btn-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 2px solid rgba(0,0,0,0.08);
      background: white;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { color: var(--text); border-color: rgba(0,0,0,0.15); transform: translateY(-2px); }
    .btn-icon:active { transform: scale(0.92); }

    /* Stats */
    .stats {
      margin-top: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .stats span { color: var(--accent); }

    /* SVG arc */
    #arc-track { stroke: rgba(0,0,0,0.06); }
    #arc-fill  { stroke: var(--accent); transition: stroke-dashoffset 0.6s linear, stroke 0.4s ease; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <div class="tabs">
    <button class="tab active" data-mode="work">🍅 Focus</button>
    <button class="tab" data-mode="short">☕ Short</button>
    <button class="tab" data-mode="long">🌙 Long</button>
  </div>

  <div class="ring-wrap">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle id="arc-track" cx="110" cy="110" r="96" fill="none" stroke-width="10"/>
      <circle id="arc-fill"  cx="110" cy="110" r="96" fill="none" stroke-width="10"
              stroke-linecap="round"
              stroke-dasharray="603.19"
              stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <div class="ring-emoji" id="emoji">🍅</div>
      <div class="ring-time" id="display">25:00</div>
      <div class="ring-label" id="mode-label">FOCUS</div>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="controls">
    <button class="btn-icon" id="btn-reset" title="Reset">↺</button>
    <button class="btn-main" id="btn-start">START</button>
    <button class="btn-icon" id="btn-skip" title="Skip">⏭</button>
  </div>

  <div class="stats">
    <span id="count">0</span> sessions today
  </div>
</div>

<script>
const MODES = {
  work:  { label: "FOCUS",       emoji: "🍅", duration: 25*60, color: "#ff6b6b", bg: "#fff5f5" },
  short: { label: "SHORT BREAK", emoji: "☕", duration:  5*60, color: "#63cdda", bg: "#f0fbfc" },
  long:  { label: "LONG BREAK",  emoji: "🌙", duration: 15*60, color: "#a29bfe", bg: "#f5f3ff" },
};
const CIRC = 2 * Math.PI * 96; // 603.19

let mode = "work";
let timeLeft = MODES.work.duration;
let running = false;
let workCount = 0;
let sessionsToday = 0;
let interval = null;

// Elements
const display    = document.getElementById("display");
const modeLabel  = document.getElementById("mode-label");
const emojiEl    = document.getElementById("emoji");
const arcFill    = document.getElementById("arc-fill");
const dotsEl     = document.getElementById("dots");
const countEl    = document.getElementById("count");
const btnStart   = document.getElementById("btn-start");
const tabs       = document.querySelectorAll(".tab");

// Audio
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playChime(type) {
  ctx.resume();
  const notes = type === "start"    ? [523.25, 659.25, 783.99]   // C5 E5 G5 - cheerful
              : type === "break"    ? [783.99, 659.25, 523.25]   // G5 E5 C5 - gentle descend
              : type === "complete" ? [523.25, 659.25, 783.99, 1046.5] // C5 E5 G5 C6 - finish
              : [];

  notes.forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    osc.start(t);
    osc.stop(t + 0.5);
  });
}

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

function applyTheme(m) {
  const { color, bg } = MODES[m];
  document.documentElement.style.setProperty("--accent", color);
  document.documentElement.style.setProperty("--bg-work", bg);
  document.body.style.background = bg;
}

function renderDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i < workCount % 4 ? " filled" : "");
    dotsEl.appendChild(d);
  }
}

function renderArc() {
  const progress = timeLeft / MODES[mode].duration;
  arcFill.style.strokeDashoffset = CIRC * (1 - progress);
}

function render() {
  display.textContent = fmt(timeLeft);
  modeLabel.textContent = MODES[mode].label;
  emojiEl.textContent = MODES[mode].emoji;
  btnStart.textContent = running ? "PAUSE" : "START";
  countEl.textContent = sessionsToday;
  renderArc();
  renderDots();
  tabs.forEach(t => t.classList.toggle("active", t.dataset.mode === mode));
}

function wiggleEmoji() {
  emojiEl.classList.remove("pulse");
  void emojiEl.offsetWidth;
  emojiEl.classList.add("pulse");
  setTimeout(() => emojiEl.classList.remove("pulse"), 500);
}

function switchMode(m, sound = "break") {
  mode = m;
  timeLeft = MODES[m].duration;
  running = false;
  clearInterval(interval);
  applyTheme(m);
  wiggleEmoji();
  if (sound) playChime(sound);
  render();
}

function advance() {
  if (mode === "work") {
    workCount++;
    sessionsToday++;
    const next = workCount % 4 === 0 ? "long" : "short";
    switchMode(next, "break");
    playChime("complete");
  } else {
    switchMode("work", "start");
  }
}

function tick() {
  if (timeLeft <= 1) {
    clearInterval(interval);
    running = false;
    timeLeft = 0;
    render();
    advance();
    return;
  }
  timeLeft--;
  render();
}

btnStart.addEventListener("click", () => {
  ctx.resume();
  running = !running;
  if (running) {
    playChime("start");
    interval = setInterval(tick, 1000);
  } else {
    clearInterval(interval);
  }
  render();
});

document.getElementById("btn-reset").addEventListener("click", () => {
  running = false;
  clearInterval(interval);
  timeLeft = MODES[mode].duration;
  render();
});

document.getElementById("btn-skip").addEventListener("click", () => {
  running = false;
  clearInterval(interval);
  advance();
});

tabs.forEach(t => {
  t.addEventListener("click", () => {
    if (t.dataset.mode !== mode) switchMode(t.dataset.mode, null);
  });
});

// SW registration
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(console.error);
}

applyTheme("work");
render();
</script>
</body>
</html>
